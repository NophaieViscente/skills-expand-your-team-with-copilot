name: Update Existing Activity
description: Request changes to an activity already listed on the website
title: "Update Activity: [Activity Name]"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request changes to an existing activity. Please fill in all fields that apply so the update can be handled quickly and correctly.

  - type: input
    id: activity_name
    attributes:
      label: Activity Name
      description: The exact name of the activity you want to change (must match what is currently shown on the website).
      placeholder: e.g., Chess Club
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### What would you like to change?
        Fill in only the fields you want to update. Leave the others blank.

  - type: input
    id: new_name
    attributes:
      label: New Activity Name (if changing)
      description: Leave blank if the name is not changing.
      placeholder: e.g., Advanced Chess Club

  - type: textarea
    id: new_description
    attributes:
      label: New Description (if changing)
      description: The updated description for the activity. Leave blank if not changing.
      placeholder: e.g., An advanced chess club for experienced players.

  - type: input
    id: new_schedule
    attributes:
      label: New Schedule (human-readable, if changing)
      description: Write the new schedule in plain text. Leave blank if not changing.
      placeholder: e.g., Mondays and Wednesdays, 4:00 PM - 5:30 PM

  - type: checkboxes
    id: new_days
    attributes:
      label: New Day(s) of the Week (if changing)
      description: Select all new days. Leave all unchecked if the days are not changing.
      options:
        - label: Monday
        - label: Tuesday
        - label: Wednesday
        - label: Thursday
        - label: Friday
        - label: Saturday
        - label: Sunday

  - type: input
    id: new_start_time
    attributes:
      label: New Start Time (24-hour format, if changing)
      description: Leave blank if the start time is not changing.
      placeholder: e.g., 16:00

  - type: input
    id: new_end_time
    attributes:
      label: New End Time (24-hour format, if changing)
      description: Leave blank if the end time is not changing.
      placeholder: e.g., 17:30

  - type: input
    id: new_max_participants
    attributes:
      label: New Maximum Number of Participants (if changing)
      description: Leave blank if the maximum is not changing.
      placeholder: e.g., 15

  - type: textarea
    id: reason
    attributes:
      label: Reason for Change
      description: Briefly explain why this change is needed.
      placeholder: e.g., The classroom we use on Tuesdays is no longer available, so we need to switch to Mondays.
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How will you know this update was done correctly? List what you expect to see.
      value: |
        - [ ] The activity on the website reflects all the requested changes
        - [ ] No other activities or data were accidentally changed
        - [ ] Students can still sign up for the activity after the update
    validations:
      required: true
