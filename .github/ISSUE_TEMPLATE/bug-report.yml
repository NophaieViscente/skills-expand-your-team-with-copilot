name: Bug Report
description: Report something on the website that is not working correctly
title: "Bug: [Short description of the problem]"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to report a problem or something that is not working as expected on the website. The more detail you provide, the faster it can be fixed.

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe the problem clearly. What did you see or experience?
      placeholder: e.g., When I click the "Sign Up" button for Chess Club, nothing happens and I see an error message.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: What should have happened instead?
      description: Describe what you expected to happen.
      placeholder: e.g., The student should be signed up for the Chess Club and their name should appear in the list.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: List the steps someone else can follow to see the same problem.
      placeholder: |
        1. Open the website
        2. Click on "Chess Club"
        3. Enter a student email and click "Sign Up"
        4. See error
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which web browser were you using when the problem occurred?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How will you know the bug is fixed?
      value: |
        - [ ] The problem described above no longer occurs
        - [ ] The expected behavior now works correctly
        - [ ] No other parts of the website are broken by the fix
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any screenshots, error messages, or other details that might help. You can paste error text or attach a screenshot.
      placeholder: e.g., Error message shown was "500 Internal Server Error"
